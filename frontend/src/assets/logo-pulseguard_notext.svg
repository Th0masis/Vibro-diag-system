<svg width="420" height="420" viewBox="0 0 420 420"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="rgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c62828"/>
      <stop offset="100%" stop-color="#ff8f00"/>
    </linearGradient>

    <linearGradient id="rgLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffcc80"/>
      <stop offset="100%" stop-color="#ff7043"/>
    </linearGradient>
  </defs>

  <!-- Shield -->
  <path d="M210 30
           C290 55 340 55 340 55
           V200
           C340 260 280 315 210 350
           C140 315 80 260 80 200
           V55
           C80 55 130 55 210 30 Z"
        fill="url(#rgGradient)"
        stroke="#ffffff"
        stroke-width="6"/>

  <!-- Pulse line -->
  <polyline points="105,185 145,185 165,150 185,220 205,170 225,185 315,185"
            fill="none"
            stroke="#ffffff"
            stroke-width="6"
            stroke-linejoin="round"
            stroke-linecap="round"/>

  <!-- Bars (vibration / ML features) -->
  <rect x="235" y="200" width="14" height="40" fill="#ffffff"/>
  <rect x="255" y="185" width="14" height="55" fill="#ffffff"/>
  <rect x="275" y="165" width="14" height="75" fill="#ffffff"/>

  <!-- Neural network -->
  <circle cx="300" cy="140" r="6" fill="#ffffff"/>
  <circle cx="325" cy="155" r="6" fill="#ffffff"/>
  <circle cx="305" cy="170" r="6" fill="#ffffff"/>
  <circle cx="330" cy="185" r="6" fill="#ffffff"/>

  <line x1="300" y1="140" x2="325" y2="155" stroke="#ffffff" stroke-width="2"/>
  <line x1="300" y1="140" x2="305" y2="170" stroke="#ffffff" stroke-width="2"/>
  <line x1="305" y1="170" x2="330" y2="185" stroke="#ffffff" stroke-width="2"/>
  <line x1="325" y1="155" x2="330" y2="185" stroke="#ffffff" stroke-width="2"/>
</svg>
